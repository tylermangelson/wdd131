<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="A collection of delicious recipes">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="A collection of delicious recipes">
    <meta name="twitter:image" content="social-preview-image.png">

    <link rel="icon" href="/favicon.ico">

    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>

<body>

    <div class="header">
        <img src="images/recipe-book.png" alt="">
        <p>RecipeBook</p>
    </div>

    <form class="search-form" role="search" onsubmit="return false">
        <input id="search" type="search" placeholder="Find a recipe" aria-label="Find a recipe">
        <button type="button">
            <img src="images/search.svg" alt="Search">
        </button>
    </form>

    <div id="recipe-container"></div>

    <div class="bottom-bar">
        <footer>
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
        </footer>

        <div class="social">
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
    </div>

</body>

</html>
